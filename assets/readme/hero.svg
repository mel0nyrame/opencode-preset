<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">OpenCode Preset — specialist agents, one coordinated workflow</title>
  <desc id="desc">A technical dark hero showing an Orchestrator routing work to Explorer, Librarian, Designer, Fixer, Observer, and Oracle before verification.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020617" flood-opacity=".45"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="#070b14"/>
  <path d="M0 74H1200" stroke="#1e293b"/>
  <circle cx="38" cy="37" r="7" fill="#fb7185"/>
  <circle cx="62" cy="37" r="7" fill="#fbbf24"/>
  <circle cx="86" cy="37" r="7" fill="#4ade80"/>
  <text x="112" y="44" fill="#94a3b8" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">~/opencode-preset  ·  orchestration session</text>
  <text x="1100" y="44" text-anchor="end" fill="#64748b" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">v0.1.0</text>

  <g transform="translate(58 112)">
    <text x="0" y="0" fill="#38bdf8" font-size="18" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">OPENCODE / MULTI-AGENT PRESET</text>
    <text x="0" y="74" fill="#f8fafc" font-size="58" font-weight="750" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">OpenCode Preset</text>
    <rect x="0" y="97" width="520" height="4" rx="2" fill="url(#accent)"/>
    <text x="0" y="145" fill="#cbd5e1" font-size="25" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Specialist agents. One coordinated workflow.</text>
    <text x="0" y="184" fill="#94a3b8" font-size="20" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Route research, design, implementation, and review</text>
    <text x="0" y="214" fill="#94a3b8" font-size="20" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">without exhausting the primary session.</text>
    <g transform="translate(0 250)">
      <rect width="156" height="38" rx="19" fill="#0c4a6e" stroke="#38bdf8"/>
      <text x="78" y="25" text-anchor="middle" fill="#e0f2fe" font-size="17" font-weight="650" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">PLAN → DELEGATE</text>
      <rect x="170" width="118" height="38" rx="19" fill="#2e1065" stroke="#a78bfa"/>
      <text x="229" y="25" text-anchor="middle" fill="#ede9fe" font-size="17" font-weight="650" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">SPECIALIZE</text>
      <rect x="302" width="100" height="38" rx="19" fill="#052e16" stroke="#4ade80"/>
      <text x="352" y="25" text-anchor="middle" fill="#dcfce7" font-size="17" font-weight="650" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">VERIFY</text>
    </g>
  </g>

  <g transform="translate(720 104)" filter="url(#soft)">
    <rect width="422" height="268" rx="22" fill="url(#panel)" stroke="#334155"/>
    <text x="24" y="34" fill="#64748b" font-size="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">TASK ROUTER / LIVE MAP</text>
    <path d="M211 102V137M211 137H79V166M211 137H145V166M211 137H211V166M211 137H277V166M211 137H343V166" fill="none" stroke="#475569" stroke-width="2"/>
    <rect x="118" y="56" width="186" height="52" rx="12" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <circle cx="142" cy="82" r="6" fill="#38bdf8"/>
    <text x="159" y="89" fill="#e0f2fe" font-size="22" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">ORCHESTRATOR</text>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" text-anchor="middle">
      <rect x="30" y="166" width="98" height="42" rx="9" fill="#16122b" stroke="#7c3aed"/><text x="79" y="192" fill="#ddd6fe">EXPLORE</text>
      <rect x="137" y="166" width="98" height="42" rx="9" fill="#16122b" stroke="#7c3aed"/><text x="186" y="192" fill="#ddd6fe">RESEARCH</text>
      <rect x="244" y="166" width="68" height="42" rx="9" fill="#16122b" stroke="#7c3aed"/><text x="278" y="192" fill="#ddd6fe">BUILD</text>
      <rect x="321" y="166" width="72" height="42" rx="9" fill="#16122b" stroke="#7c3aed"/><text x="357" y="192" fill="#ddd6fe">REVIEW</text>
    </g>
    <path d="M79 208V230H357V208M211 230V240" fill="none" stroke="#4ade80" stroke-width="2"/>
    <rect x="128" y="229" width="166" height="27" rx="8" fill="#052e16" stroke="#4ade80"/>
    <text x="211" y="248" text-anchor="middle" fill="#dcfce7" font-size="16" font-weight="700" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">MINIMUM VERIFICATION</text>
  </g>
</svg>
