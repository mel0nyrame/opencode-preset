<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-labelledby="title desc">
  <title id="title">OpenCode Preset orchestration workflow</title>
  <desc id="desc">A request moves through planning, parallel specialist work, minimum verification, and a unified delivery.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#64748b"/></marker>
  </defs>
  <rect width="1200" height="470" rx="26" fill="#070b14"/>
  <text x="56" y="60" fill="#f8fafc" font-size="40" font-weight="750" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">One request. The lightest capable workflow.</text>
  <text x="56" y="94" fill="#94a3b8" font-size="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">Only the specialists relevant to the task are activated.</text>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="56" y="148" width="170" height="82" rx="14" fill="#111827" stroke="#334155"/>
    <text x="141" y="180" text-anchor="middle" fill="#94a3b8" font-size="16">01 / INPUT</text>
    <text x="141" y="207" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">User request</text>

    <path d="M226 189H284" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="294" y="148" width="190" height="82" rx="14" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="389" y="180" text-anchor="middle" fill="#7dd3fc" font-size="16">02 / CONTROL</text>
    <text x="389" y="207" text-anchor="middle" fill="#e0f2fe" font-size="22" font-weight="700">Orchestrator</text>

    <path d="M484 189H543" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="553" y="128" width="382" height="122" rx="16" fill="#111827" stroke="#7c3aed"/>
    <text x="576" y="158" fill="#c4b5fd" font-size="16">03 / PARALLEL SPECIALISTS</text>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" text-anchor="middle">
      <rect x="576" y="176" width="100" height="42" rx="9" fill="#21183d"/><text x="626" y="202" fill="#ede9fe">Explorer</text>
      <rect x="687" y="176" width="112" height="42" rx="9" fill="#21183d"/><text x="743" y="202" fill="#ede9fe">Librarian</text>
      <rect x="810" y="176" width="102" height="42" rx="9" fill="#21183d"/><text x="861" y="202" fill="#ede9fe">Designer</text>
    </g>

    <path d="M935 189H990" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="1000" y="148" width="144" height="82" rx="14" fill="#052e16" stroke="#4ade80" stroke-width="2"/>
    <text x="1072" y="180" text-anchor="middle" fill="#86efac" font-size="16">04 / GATE</text>
    <text x="1072" y="207" text-anchor="middle" fill="#dcfce7" font-size="22" font-weight="700">Verify</text>

    <path d="M1072 230V306H970" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="745" y="270" width="215" height="72" rx="14" fill="#111827" stroke="#334155"/>
    <text x="852" y="298" text-anchor="middle" fill="#94a3b8" font-size="16">05 / OUTPUT</text>
    <text x="852" y="323" text-anchor="middle" fill="#f8fafc" font-size="21" font-weight="700">Unified delivery</text>
  </g>

  <path d="M56 390H1144" stroke="#1e293b"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">
    <circle cx="65" cy="423" r="6" fill="#38bdf8"/><text x="82" y="429" fill="#cbd5e1">plan only what the request needs</text>
    <circle cx="439" cy="423" r="6" fill="#a78bfa"/><text x="456" y="429" fill="#cbd5e1">isolate specialist context</text>
    <circle cx="794" cy="423" r="6" fill="#4ade80"/><text x="811" y="429" fill="#cbd5e1">verify before claiming completion</text>
  </g>
</svg>
