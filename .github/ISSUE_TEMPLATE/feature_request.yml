name: 功能建议
description: 提议新 Command、新 Skill、工作流改进或其他增强
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 在提交前

        - 请先搜索已有 Issue，避免重复。
        - 如为 Skill 或 Command 建议，请说明触发场景与大致范围。
        - 不要在此提交 API Key、Token、个人绝对路径或私仓信息。

  - type: dropdown
    id: category
    attributes:
      label: 建议类型
      options:
        - 新 Command
        - 新 Skill
        - 工作流改进
        - 文档改进
        - 其他
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 这个建议解决什么问题，谁会受益。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 具体建议
      description: 期望的入口、参数、行为或输出。如果是 Skill，可说明触发词与大致步骤。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 是否已有临时方案或其他实现方式。
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 参考链接、原型、许可证说明等。不要包含敏感信息。
    validations:
      required: false
