name: Static Checks

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JSON files are parseable
        run: |
          set -e
          failed=0
          while IFS= read -r -d '' file; do
            if ! python3 -m json.tool "$file" >/dev/null 2>&1; then
              echo "JSON parse error: $file"
              failed=1
            fi
          done < <(find . -type f -name '*.json' ! -path './.git/*' ! -path '*/node_modules/*' -print0)
          exit $failed

      - name: Check shell script syntax
        run: |
          set -e
          failed=0
          while IFS= read -r -d '' file; do
            shebang=$(head -n1 "$file")
            if printf '%s\n' "$shebang" | grep -qE '^#!.*/(env )?bash($| )'; then
              if ! bash -n "$file"; then
                echo "bash syntax error: $file"
                failed=1
              fi
            elif printf '%s\n' "$shebang" | grep -qE '^#!.*/(env )?sh($| )'; then
              if ! sh -n "$file"; then
                echo "sh syntax error: $file"
                failed=1
              fi
            else
              if ! bash -n "$file"; then
                echo "shell syntax error: $file"
                failed=1
              fi
            fi
          done < <(find . -type f \( -name '*.sh' -o -name '*.bash' \) ! -path './.git/*' ! -path '*/node_modules/*' -print0)
          exit $failed

      - name: Check JS/MJS syntax with node --check
        run: |
          set -e
          failed=0
          while IFS= read -r -d '' file; do
            if ! node --check "$file"; then
              echo "JS/MJS syntax error: $file"
              failed=1
            fi
          done < <(find . -type f \( -name '*.js' -o -name '*.mjs' \) ! -path './.git/*' ! -path '*/node_modules/*' -print0)
          exit $failed

      - name: Check Markdown local relative links
        run: |
          python3 - <<'PY'
          import re
          import sys
          from pathlib import Path
          from urllib.parse import unquote

          link_re = re.compile(r"!?\[([^\]]*)\]\(([^)]+)\)")
          bad = []

          for md in Path('.').rglob('*.md'):
              if '.git' in md.parts or 'node_modules' in md.parts:
                  continue

              text = md.read_text(encoding='utf-8', errors='ignore')
              # Ignore links inside fenced or inline code to avoid flagging examples.
              text = re.sub(r'```[\s\S]*?```', '', text)
              text = re.sub(r'`[^`]*`', '', text)

              for _, target in link_re.findall(text):
                  target = target.strip()
                  if not target:
                      continue
                  if target.startswith(('http://', 'https://', 'mailto:', '#')):
                      continue
                  if '://' in target or target.startswith('//'):
                      continue

                  clean = unquote(target.split('#')[0].split('?')[0])
                  if not clean:
                      continue

                  resolved = (md.parent / clean).resolve()
                  if not resolved.exists():
                      bad.append(f"{md}: {target}")

          if bad:
              print("Broken local relative links:")
              for item in bad:
                  print(" ", item)
              sys.exit(1)

          print("All Markdown local relative links OK")
          PY

      - name: Check local skill references are closed-loop
        run: |
          python3 - <<'PY'
          import json
          import sys
          from pathlib import Path

          config = Path('.opencode/oh-my-opencode-slim.json')
          skills_dir = Path('.opencode/skills')

          if not config.exists():
              print("Skill config not found; skipping")
              sys.exit(0)

          with config.open(encoding='utf-8') as f:
              data = json.load(f)

          referenced = set()

          def walk(obj):
              if isinstance(obj, dict):
                  for k, v in obj.items():
                      if k == 'skills' and isinstance(v, list):
                          referenced.update(v)
                      else:
                          walk(v)
              elif isinstance(obj, list):
                  for item in obj:
                      walk(item)

          walk(data)

          allowed = {'customize-opencode'}
          local_skills = {p.name for p in skills_dir.iterdir() if p.is_dir()} if skills_dir.exists() else set()
          missing = [s for s in referenced if s not in local_skills and s not in allowed]

          if missing:
              print("Referenced skills missing from .opencode/skills/:")
              for s in missing:
                  print(" ", s)
              sys.exit(1)

          print("Local skill references OK")
          PY

      - name: Check Morph PPTX base template integrity
        run: |
          python3 - <<'PY'
          import sys
          import zipfile
          from pathlib import Path

          styles_dir = Path('.opencode/skills/morph-ppt/reference/styles')
          if not styles_dir.exists():
              print("Morph styles directory not found")
              sys.exit(1)

          pptxs = sorted(styles_dir.rglob('*.pptx'))
          if len(pptxs) != 27:
              print(f"Expected 27 Morph PPTX base files, found {len(pptxs)}")
              sys.exit(1)

          failed = []
          for p in pptxs:
              try:
                  with zipfile.ZipFile(p, 'r') as z:
                      names = z.namelist()
                      if '[Content_Types].xml' not in names:
                          failed.append(f"{p}: missing [Content_Types].xml")
              except zipfile.BadZipFile:
                  failed.append(f"{p}: not a valid ZIP")

          if failed:
              print("Morph PPTX integrity failures:")
              for item in failed:
                  print(" ", item)
              sys.exit(1)

          print(f"All {len(pptxs)} Morph PPTX templates valid")
          PY

      - name: Scan for common secrets patterns
        run: |
          python3 - <<'PY'
          import re
          import subprocess
          import sys

          patterns = [
              r'AKIA[0-9A-Z]{16}',
              r'ghp_[A-Za-z0-9_]{36}',
              r'gho_[A-Za-z0-9_]{36}',
              r'ghu_[A-Za-z0-9_]{36}',
              r'ghs_[A-Za-z0-9_]{36}',
              r'ghr_[A-Za-z0-9_]{36}',
              r'sk-[a-zA-Z0-9]{20,}',
              r'https://hooks\.slack\.com/services/',
              r'BEGIN (RSA|DSA|EC|OPENSSH) PRIVATE KEY',
          ]
          regex = re.compile('|'.join(patterns))

          try:
              files = subprocess.check_output(['git', 'ls-files'], text=True).splitlines()
          except subprocess.CalledProcessError:
              files = []

          hits = []
          for f in files:
              if f.endswith('.pptx'):
                  continue
              try:
                  with open(f, 'r', encoding='utf-8', errors='ignore') as fh:
                      for i, line in enumerate(fh, 1):
                          if regex.search(line):
                              hits.append(f"{f}:{i}: {line.strip()}")
              except IsADirectoryError:
                  continue

          if hits:
              print("Potential secrets detected (review for false positives):")
              for h in hits:
                  print(" ", h)
              sys.exit(1)

          print("No common secrets patterns detected")
          PY

      - name: Check git diff for whitespace errors
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
          PR_BASE: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          set -e
          if [ "$EVENT_NAME" = "push" ]; then
            if [ -z "$PUSH_BEFORE" ] || [ "$PUSH_BEFORE" = "0000000000000000000000000000000000000000" ]; then
              echo "Skipping whitespace check for branch creation"
              exit 0
            fi
            git diff --check "$PUSH_BEFORE".."$PUSH_AFTER"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --check "$PR_BASE".."$PR_HEAD"
          else
            echo "Unsupported event: $EVENT_NAME"
            exit 0
          fi
